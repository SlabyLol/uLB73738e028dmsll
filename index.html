<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Portal</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #age-gate, #login-container, #video-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        button {
            padding: 12px 24px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #0f172a;
            font-weight: bold;
            transition: 0.3s;
            margin: 5px;
        }

        button:hover { opacity: 0.9; transform: scale(1.02); }

        #login-container, #video-container { display: none; }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 12px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="age-gate">
        <h2>Age Verification</h2>
        <p>Are you at least 18 years old?</p>
        <button onclick="confirmAge()">Yes, I am 18+</button>
        <button onclick="window.location.href='https://www.google.com'">No</button>
    </div>

    <div id="login-container">
        <h2>Access Required</h2>
        <input type="password" id="password" placeholder="Enter password...">
        <br>
        <button onclick="checkPassword()">Unlock Access</button>
    </div>

    <div id="video-container">
        <div class="video-wrapper">
            <iframe 
                src="https://iframe.mediadelivery.net/embed/642632/5e5f2cce-b858-4e95-8b37-06292b7ac059?autoplay=true&loop=false&muted=false&preload=true&responsive=true" 
                loading="lazy" 
                style="border:none;" 
                allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" 
                allowfullscreen="true">
            </iframe>
        </div>
    </div>

    <script>
        function confirmAge() {
            document.getElementById('age-gate').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
        }

        function checkPassword() {
            const password = document.getElementById('password').value;
            const correctPassword = "videoC00K";

            if (password === correctPassword) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('video-container').style.display = 'block';
            } else {
                alert("Incorrect Password!");
            }
        }
    </script>
</body>
</html>
