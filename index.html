<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Video Access</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #login-container, #video-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 90%;
            max-width: 640px;
        }

        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }

        button {
            padding: 12px 24px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #0f172a;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; }

        #video-container { display: none; }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>Zugriff erforderlich</h2>
        <input type="password" id="password" placeholder="Passwort eingeben...">
        <br>
        <button onclick="checkPassword()">Entsperren</button>
    </div>

    <div id="video-container">
        <div class="video-wrapper">
            <iframe 
                src="https://player.vimeo.com/video/1185381694" 
                frameborder="0" 
                allow="autoplay; fullscreen; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById('password').value;
            const correctPassword = "videoC00K";

            if (password === correctPassword) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('video-container').style.display = 'block';
            } else {
                alert("Falsches Passwort!");
            }
        }
    </script>
</body>
</html>
